name: Release Pipeline

on:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "LICENSE"
      - ".github/workflows/**"
      - ".devtools/**"
    branches:
      - dev
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Tag and version
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            OUTPUT=$(node .devtools/tag.js --rc)
            echo "$OUTPUT"
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            OUTPUT=$(node .devtools/tag.js --final)
            echo "$OUTPUT"
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

          if echo "$OUTPUT" | grep -q "Nothing to release"; then
            echo "skipped=true" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Push tags
        if: steps.tag.outputs.skipped == 'false'
        run: git push origin HEAD --tags

      # Uncomment when tests are ready:
      # - name: Run tests
      #   run: npm test

      - name: Create GitHub Release
        if: steps.tag.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag.outputs.version }}
          name: >-
            ${{ steps.tag.outputs.prerelease == 'true'
              && format('[RC] v{0}', steps.tag.outputs.version)
              || format('Release v{0}', steps.tag.outputs.version) }}
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.tag.outputs.skipped == 'false' && github.ref == 'refs/heads/master'
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
