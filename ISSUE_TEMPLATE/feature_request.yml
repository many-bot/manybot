name: Feature Request
description: Propose a technical improvement or new capability for the core bot.
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > This is the right place for **technical suggestions** — architecture changes, new APIs, core behavior, performance, etc.
        >
        > Looking to suggest a new command or share general feedback? Those fit better in the community spaces:
        > - 💬 [WhatsApp group](https://...)
        > - 🎮 [Discord server](https://...)
        > - 🌐 [Guestbook on the site](https://...)

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the context or limitation you're running into.
      placeholder: "Currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like to see this addressed? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: References, prior art, mockups, or anything else useful.
    validations:
      required: false
